# =============================================================================
# docker-compose.prod.yml — PRODUCTION Compose
# =============================================================================
#
# HOW THIS DIFFERS FROM docker-compose.yml (development):
#
#   Development (docker-compose.yml):
#     auth-service:
#       build: ./services/auth-service   ← builds from local Dockerfile
#
#   Production (docker-compose.prod.yml):
#     auth-service:
#       image: ghcr.io/thimira20/auth-service:latest  ← PULLS from GHCR
#
# WHY TWO FILES?
#   - Development: build locally, fast iteration, no GHCR needed
#   - Production: pull pre-built tested images from GHCR
#
# JENKINS USES THIS FILE IN THE DEPLOY STAGE:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Infrastructure services (MySQL, Redis, Kafka etc.) use official Docker Hub
# images in BOTH dev and prod — they never need to be "built".
# =============================================================================

version: "3.9"

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  exam_net:
    driver: bridge

services:

  # ── INFRASTRUCTURE (official images — same in dev and prod) ──────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --binlog-format=ROW
      --binlog-row-image=FULL
      --log-bin=mysql-bin
      --server-id=1
      --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - exam_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - exam_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - exam_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - exam_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - exam_net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  debezium:
    image: debezium/connect:2.4
    container_name: debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - exam_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - exam_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── APPLICATION SERVICES — pulled from GHCR ─────────────────────────────
  # KEY DIFFERENCE: "image:" instead of "build:"
  # Jenkins built and pushed these to GHCR.
  # "docker compose pull" downloads the latest version here.

  auth-service:
    image: ghcr.io/thimira20/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: auth_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - exam_net

  result-service:
    image: ghcr.io/thimira20/result-service:latest
    container_name: result-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: exam_db
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - exam_net

  admin-service:
    image: ghcr.io/thimira20/admin-service:latest
    container_name: admin-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: exam_db
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - exam_net

  notification-service:
    image: ghcr.io/thimira20/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      PORT: 4004
      MONGO_URI: mongodb://mongodb:27017/notif_db
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - exam_net

  kafka-rabbitmq-bridge:
    image: ghcr.io/thimira20/kafka-rabbitmq-bridge:latest
    container_name: kafka-rabbitmq-bridge
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: exam_db.exam_db.results
      KAFKA_GROUP_ID: exam-bridge-group
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE: results.published
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: auth_db
    networks:
      - exam_net
