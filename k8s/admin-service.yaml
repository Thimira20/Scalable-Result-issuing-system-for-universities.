# ═══════════════════════════════════════════════════════════════════════════
# ADMIN SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  labels:
    app: exam-system
    component: admin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      component: admin-service
  template:
    metadata:
      labels:
        component: admin-service
    spec:
      containers:
        - name: admin-service
          image: admin-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: REDIS_URL
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: "exam_db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /admin/health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /admin/health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: admin-service
  labels:
    app: exam-system
    component: admin-service
spec:
  type: ClusterIP
  selector:
    component: admin-service
  ports:
    - port: 4003
      targetPort: 4003
