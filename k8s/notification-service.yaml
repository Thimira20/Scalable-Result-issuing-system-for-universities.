# ═══════════════════════════════════════════════════════════════════════════
# NOTIFICATION SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: exam-system
    component: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      component: notification-service
  template:
    metadata:
      labels:
        component: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: MONGO_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: RABBITMQ_URL
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: EMAIL_PASS
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /notifications/health
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /notifications/health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: notification-service
  labels:
    app: exam-system
    component: notification-service
spec:
  type: ClusterIP
  selector:
    component: notification-service
  ports:
    - port: 4004
      targetPort: 4004
