# ═══════════════════════════════════════════════════════════════════════════
# KAFKA STACK — Zookeeper + Kafka + Debezium Connect + RabbitMQ
# ═══════════════════════════════════════════════════════════════════════════
#
# These are the CDC pipeline infra components.
# In production, you'd likely use managed services (Amazon MSK, CloudAMQP)
# instead of running Kafka/RabbitMQ yourself in K8s.
# For learning purposes, we run them all as K8s Deployments.
# ═══════════════════════════════════════════════════════════════════════════

# ── ZOOKEEPER ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  labels:
    app: exam-system
    component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      component: zookeeper
  template:
    metadata:
      labels:
        component: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: zookeeper-service
spec:
  type: ClusterIP
  selector:
    component: zookeeper
  ports:
    - port: 2181
      targetPort: 2181

---

# ── KAFKA ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: exam-system
    component: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      component: kafka
  template:
    metadata:
      labels:
        component: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-service:2181"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              # Inside K8s, all communication goes through the Service name
              value: "PLAINTEXT://kafka-service:9092"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---

apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  type: ClusterIP
  selector:
    component: kafka
  ports:
    - port: 9092
      targetPort: 9092

---

# ── DEBEZIUM CONNECT ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium
  labels:
    app: exam-system
    component: debezium
spec:
  replicas: 1
  selector:
    matchLabels:
      component: debezium
  template:
    metadata:
      labels:
        component: debezium
    spec:
      containers:
        - name: debezium
          image: debezium/connect:2.4
          ports:
            - containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: GROUP_ID
              value: "debezium-connect-group"
            - name: CONFIG_STORAGE_TOPIC
              value: "debezium_connect_configs"
            - name: OFFSET_STORAGE_TOPIC
              value: "debezium_connect_offsets"
            - name: STATUS_STORAGE_TOPIC
              value: "debezium_connect_statuses"
            - name: KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---

apiVersion: v1
kind: Service
metadata:
  name: debezium-service
spec:
  type: ClusterIP
  selector:
    component: debezium
  ports:
    - port: 8083
      targetPort: 8083

---

# ── RABBITMQ ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    app: exam-system
    component: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      component: rabbitmq
  template:
    metadata:
      labels:
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672    # AMQP protocol
            - containerPort: 15672   # Management UI
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
spec:
  type: ClusterIP
  selector:
    component: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
