# ═══════════════════════════════════════════════════════════════════════════
# RESULT SERVICE — Deployment + Service
# ═══════════════════════════════════════════════════════════════════════════
#
# This is the service that gets the HorizontalPodAutoscaler (HPA).
# Why? Because exam results day = thousands of students hitting "refresh"
# simultaneously. The HPA monitors CPU usage and spins up more Pods
# automatically (from 1 to 10).
#
# See: k8s/hpa-result.yaml for the HPA definition.
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
  labels:
    app: exam-system
    component: result-service
spec:
  replicas: 1     # Starts with 1, HPA scales up/down automatically
  selector:
    matchLabels:
      component: result-service
  template:
    metadata:
      labels:
        component: result-service
    spec:
      containers:
        - name: result-service
          image: result-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: REDIS_URL
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: exam-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exam-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: "exam_db"
          # Resource requests are IMPORTANT for HPA:
          # The HPA calculates: (actual CPU usage / requested CPU) × 100 = CPU %
          # If CPU % > 50% (our threshold), HPA creates more Pods.
          # Without requests, HPA cannot calculate percentages!
          resources:
            requests:
              cpu: "200m"       # HPA uses this as the "100%" baseline
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /results/health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /results/health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10

---

# The Service automatically load-balances across ALL Pods with label
# "component: result-service" — including the ones HPA creates.
# When HPA scales from 1→5 Pods, the Service distributes traffic evenly.
apiVersion: v1
kind: Service
metadata:
  name: result-service
  labels:
    app: exam-system
    component: result-service
spec:
  type: ClusterIP
  selector:
    component: result-service
  ports:
    - port: 4002
      targetPort: 4002
