# ═══════════════════════════════════════════════════════════════════════════
# HORIZONTAL POD AUTOSCALER (HPA) — for Result Service
# ═══════════════════════════════════════════════════════════════════════════
#
# WHAT IS HPA?
# ────────────
# HPA watches a metric (CPU usage) and automatically adjusts the number
# of running Pods (replicas) to match demand.
#
# EXAMPLE SCENARIO:
# ─────────────────
#   Normal day:    1 Pod  handles 50 student requests/minute   ✅
#   Results day:   5,000 students refresh simultaneously       🔥
#                  CPU spikes to 80%
#                  HPA detects: 80% > 50% threshold
#                  HPA increases replicas: 1 → 3 → 5 → 8 → 10
#                  K8s Service load-balances across all 10 Pods
#                  Each Pod handles ~500 students
#   After peak:    Students stop refreshing
#                  CPU drops below 50%
#                  HPA scales DOWN: 10 → 5 → 2 → 1
#
# HOW THE MATH WORKS:
# ───────────────────
#   desiredReplicas = ceil[ currentReplicas × (currentCPU / targetCPU) ]
#
#   Example:
#     currentReplicas = 1
#     currentCPU      = 80%    (each Pod using 80% of its requested CPU)
#     targetCPU       = 50%    (our threshold)
#
#     desiredReplicas = ceil[ 1 × (80/50) ] = ceil[ 1.6 ] = 2
#     → HPA scales from 1 to 2 Pods
#
#   Next check (still heavy load):
#     currentReplicas = 2
#     currentCPU      = 70%
#     desiredReplicas = ceil[ 2 × (70/50) ] = ceil[ 2.8 ] = 3
#     → HPA scales from 2 to 3 Pods
#
# PREREQUISITE:
# ─────────────
# HPA needs the Metrics Server to read CPU/memory values.
# Minikube has it built-in — just enable it:
#   minikube addons enable metrics-server
#
# WITHOUT metrics-server, HPA will show "unknown" for current metrics
# and won't be able to scale.
#
# VISUAL: HOW HPA + SERVICE WORK TOGETHER
# ────────────────────────────────────────
#
#   Student Request → Ingress → result-service (K8s Service)
#                                      │
#                          Load Balancer (round-robin)
#                        ┌─────────┼─────────┐
#                        ▼         ▼         ▼
#                     Pod #1    Pod #2    Pod #3
#                   (result)  (result)  (result)
#                        ▲
#                        │
#                   HPA monitors CPU
#                   - CPU > 50% → add Pod
#                   - CPU < 50% → remove Pod
#                   - min: 1, max: 10
#
# ═══════════════════════════════════════════════════════════════════════════

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: result-service-hpa
  labels:
    app: exam-system
    component: result-service
spec:
  # Which Deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: result-service

  # Scaling limits
  minReplicas: 1      # Never go below 1 Pod (always have at least one running)
  maxReplicas: 10     # Never go above 10 Pods (prevents runaway scaling + cost)

  # Scaling metrics
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # Scale up when average CPU across all Pods > 50%

  # Scaling behavior (optional — controls how fast scaling happens)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # Wait 30s of sustained high CPU before adding Pods
      policies:
        - type: Pods
          value: 2                       # Add at most 2 Pods per scale-up event
          periodSeconds: 60              # Check every 60 seconds
    scaleDown:
      stabilizationWindowSeconds: 120   # Wait 2 minutes of low CPU before removing Pods
      policies:                          # (prevent flapping: up-down-up-down)
        - type: Pods
          value: 1
          periodSeconds: 60
