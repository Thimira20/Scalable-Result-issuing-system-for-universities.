# =============================================================================
# nginx/jenkins.conf — Nginx Reverse Proxy for Jenkins
# =============================================================================
#
# WHY NGINX IN FRONT OF JENKINS?
#
#   Without Nginx:  http://your-server-ip:8080  ← ugly, no HTTPS, port exposed
#   With Nginx:     https://jenkins.yourdomain.com  ← clean URL, HTTPS, port 80/443
#
# WHAT NGINX DOES HERE:
#   1. Listens on port 80 (HTTP) and redirects to 443 (HTTPS)
#   2. Terminates SSL/TLS — Jenkins itself speaks plain HTTP
#   3. Forwards all requests to Jenkins at localhost:8080
#   4. Sets proper headers so Jenkins knows the real client IP and scheme
#
# WHY WEBHOOKS NEED THIS:
#   GitHub webhooks require a public HTTPS URL.
#   Your Jenkins runs on port 8080 — GitHub can't reach internal ports directly.
#   Nginx proxies port 443 → 8080, making Jenkins accessible from GitHub.
#
# SETUP (after placing this file):
#   1. sudo cp jenkins.conf /etc/nginx/sites-available/jenkins
#   2. sudo ln -s /etc/nginx/sites-available/jenkins /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d jenkins.yourdomain.com
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# REPLACE: jenkins.yourdomain.com with YOUR actual domain or subdomain
# =============================================================================

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name jenkins.yourdomain.com;

    # Redirect all plain HTTP to HTTPS permanently (301)
    # This also ensures GitHub webhooks configured with https:// work
    return 301 https://$host$request_uri;
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name jenkins.yourdomain.com;

    # SSL certificates — provided by Let's Encrypt (Certbot)
    # Certbot fills these paths automatically when you run:
    #   sudo certbot --nginx -d jenkins.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/jenkins.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase max body size — Jenkins uploads plugins and artifacts
    client_max_body_size 100M;

    # ── Proxy to Jenkins ──────────────────────────────────────────────────
    location / {
        # Forward to Jenkins running on localhost:8080
        proxy_pass          http://localhost:8080;

        # Read timeout — increase if Jenkins jobs take long to respond
        proxy_read_timeout  90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout  90s;

        # Tell Jenkins the real scheme/host/IP, not "localhost"
        # Without these, Jenkins builds wrong redirect URLs
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        # Required for Jenkins to know it's behind a proxy
        proxy_set_header    X-Forwarded-Host    $host;
        proxy_set_header    X-Forwarded-Port    $server_port;

        # WebSocket support — Jenkins uses WebSockets for live log streaming
        proxy_http_version  1.1;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          "upgrade";

        # Disable buffering for streaming logs in real time
        proxy_buffering     off;
        proxy_request_buffering off;
    }
}
